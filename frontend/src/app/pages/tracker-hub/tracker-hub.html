<div 
  class="background-wrapper text-light"
  [class.with-bg]="useBackgroundImage"
>

  <div class="container py-5">

    <div class="row justify-content-center">
      <div class="col-lg-10">

        <h2 class="text-center mb-5 text-warning fw-bold">
          SESSION HUB
        </h2>

        <div class="row g-4">

          <!-- Join Active Session -->
          <div class="col-md-6">
            <div class="card hub-card h-100">
              <div class="card-body">

                <h5 class="card-title text-danger">
                  Join Active Session
                </h5>

                <input
                  type="text"
                  class="form-control themed-input mb-3"
                  placeholder="Enter Session ID"
                  [(ngModel)]="joinSessionId"
                />

                <button
                  class="btn btn-outline-warning w-100"
                  (click)="joinSession()"
                  [disabled]="isLoading"
                >
                  Join Session
                </button>

              </div>
            </div>
          </div>

          <!-- Create New Session -->
          <div class="col-md-6">
            <div class="card hub-card h-100">
              <div class="card-body">

                <h5 class="card-title text-danger">
                  Create New Session
                </h5>

                <p class="text-secondary small">
                  Start a new encounter.
                </p>

                <button
                  class="btn btn-danger w-100 border-warning"
                  (click)="createSession()"
                  [disabled]="isLoading"
                >
                  Create Session
                </button>

              </div>
            </div>
          </div>

        </div>

        <div *ngIf="error" class="alert alert-danger mt-4 text-center">
          {{ error }}
        </div>

        <!-- Sessions List -->
        <div class="mt-5">

          <h4 class="mb-4 text-warning">Your Sessions</h4>

          <!-- Loading -->
          <div *ngIf="isLoading" class="text-center py-5">
            <div class="spinner-border text-warning"></div>
          </div>

          <!-- Empty -->
          <div *ngIf="!isLoading && allSessions.length === 0"
               class="text-secondary">
            No sessions found.
          </div>

          <!-- Cards -->
          <div class="row g-4"
               *ngIf="!isLoading && allSessions.length > 0">

            <div
              class="col-12 col-md-6"
              *ngFor="let session of allSessions"
            >
              <div
                class="card session-card hub-card h-100"
                (click)="goToSession(session._id)"
                role="button"
              >
                <div class="card-body d-flex flex-column">

                  <h5 class="card-title text-warning">
                    {{ session.name || 'Encounter' }}
                  </h5>

                  <p class="small text-secondary mb-2">
                    Session ID:
                    <span class="font-monospace text-danger">
                      {{ session._id }}
                    </span>
                  </p>

                  <div class="mt-auto">
                    <small class="text-secondary">
                      Created {{ session.createdAt | date:'mediumDate' }}
                    </small>
                  </div>

                </div>
              </div>
            </div>

          </div>

        </div>

      </div>
    </div>

  </div>
</div>
