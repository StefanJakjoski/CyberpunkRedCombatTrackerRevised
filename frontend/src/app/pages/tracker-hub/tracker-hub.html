<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <h2 class="text-center mb-4">Session Hub</h2>

      <div class="row g-4">

        <!-- Join Active Session -->
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title">Join Active Session</h5>

              <input
                type="text"
                class="form-control mb-3"
                placeholder="Enter Session ID"
                [(ngModel)]="joinSessionId"
              />

              <button
                class="btn btn-primary w-100"
                (click)="joinSession()"
                [disabled]="isLoading"
              >
                Join Session
              </button>
            </div>
          </div>
        </div>

        <!-- Create New Session -->
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title">Create New Session</h5>
              <p class="text-muted">
                Start a new encounter and become its owner.
              </p>

              <button
                class="btn btn-success w-100"
                (click)="createSession()"
                [disabled]="isLoading"
              >
                Create Session
              </button>
            </div>
          </div>
        </div>

      </div>

      <div *ngIf="error" class="alert alert-danger mt-4">
        {{ error }}
      </div>

    </div>
  </div>
</div>


<div class="container mt-5">

  <h4 class="mb-3">Your Sessions</h4>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border" role="status"></div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && allSessions.length === 0" class="text-muted">
    No sessions found.
  </div>

  <!-- Session Cards -->
  <div class="row g-4" *ngIf="!isLoading && allSessions.length > 0">

    <div
      class="col-12 col-md-6"
      *ngFor="let session of allSessions"
    >
      <div
        class="card h-100 shadow-sm session-card"
        (click)="goToSession(session._id)"
        role="button"
      >
        <div class="card-body d-flex flex-column">

          <h5 class="card-title">
            {{ session.name || 'Encounter' }}
          </h5>

          <p class="text-muted small mb-2">
            Session ID:
            <span class="font-monospace">{{ session._id }}</span>
          </p>

          <div class="mt-auto">
            <small class="text-muted">
              Created {{ session.createdAt | date:'mediumDate' }}
            </small>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>
