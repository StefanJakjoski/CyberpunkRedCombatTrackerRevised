<div 
  class="dashboard-wrapper d-flex align-items-center justify-content-center text-light"
  [class.with-bg]="useBackgroundImage"
>

  <div class="container text-center py-5 f-gothic">

    <!-- LOGGED OUT -->
    @if(!(loggedIn$ | async)){
      
      <h1 class="display-4 fw-bold text-warning mb-3" style="font-family: Sdglitch;">
        Cyberpunk RED Combat Tracker
      </h1>

      <div class="container align-items-center justify-content-center d-flex text-center mb-5">
        <p class="lead text-crimson mb-4 glow px-4 rounded-2 fw-bold" style="font-family: 'Century Gothic Bold'; color: #881a9a;">
          Welcome to the Underground.
        </p>
      </div>

      <div class="d-flex justify-content-center gap-3 flex-wrap">
        <a (click)="toLogin()" class="btn btn-crimson btn-lg px-4">
          Login
        </a>

        <a (click)="toRegister()" class="btn btn-outline-warning btn-lg px-4">
          Create Account
        </a>
      </div>
    } 
    @if(loggedIn$ | async){
    <!-- LOGGED IN -->
      <div class="fade-in text-center">

        <h1 class="display-5 fw-bold text-warning mb-3" style="font-family: Sdglitch;">
          Wake Up, Choom
        </h1>

        <div class="container align-items-center justify-content-center d-flex text-center mb-5">
          <p class="lead text-crimson mb-4 glow rounded-2 px-4 fw-bold" style="color: #881a9a;">
            We got a city to burn.
          </p>
        </div>

        <div class="d-flex justify-content-center gap-3 flex-wrap">
          <button (click)="toTracker()" class="btn btn-warning btn-lg px-4 text-dark fw-bold">
            Open Tracker
          </button>

          <button (click)="toProfile()" class="btn btn-outline-crimson btn-lg px-4">
            View Profile (Not implemented)
          </button>
        </div>

      </div>
    }

  </div>

</div>
