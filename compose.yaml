version: '3.9'                                        
services:                                                                 
                                                                          
  mongodb:                                                                
    image: mongo:8                                                        
    container_name: combattracker-db                                      
                                                                          
    volumes:                                                              
      - mongo-data:/data/db                                               
                                                                          
    ports:                                                                
      - "27017:27017"                                                     
                                                                          
  backend:                                                                
    build: ./backend                                                      
                                                                          
    ports:                                                                
      - "5000:5000"                                                       
                                                                          
    env_file:
      - ./backend/.env.local                    
                
                                                                          
    depends_on:                                                           
      - mongodb                                                           
                                                                          
  frontend:                                                               
    build: ./frontend                                                     
                                                                          
    ports:                                                                
      - "4200:80"                                                         
                                                                          
    depends_on:                                                           
      - backend                                                           
                                                                          
volumes:                                                                  
  mongo-data:                 